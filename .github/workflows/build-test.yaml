name: build-test

on: workflow_dispatch

env:
  DOCKER_BUILDKIT: 1
  BUILDKIT_PROGRESS: plain
  SOURCE_DATE_EPOCH: "1704067200"

jobs:
  build:
    runs-on: ubuntu-24.04-8-cores
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64
          persistent: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          cache-binary: true
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      # Test Alpine build (single platform)
      - name: Build latest-alpine (test)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/alpine.Dockerfile
          platforms: linux/amd64
          tags: ghcr.io/zhijunio/linkding:test
          target: linkding
          push: false
          cache-from: type=gha,scope=test-alpine
          cache-to: type=gha,scope=test-alpine,mode=max