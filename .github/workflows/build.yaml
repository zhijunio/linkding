name: build

on: workflow_dispatch

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: get_version
        run: echo "version=$(cat version.txt)" >> $GITHUB_OUTPUT
    outputs:
      version: ${{ steps.get_version.outputs.version }}

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: latest
            file: ./docker/default.Dockerfile
            target: linkding
            suffix: ""
            cache_ref: ghcr.io/zhijunio/linkding:buildcache
          - name: latest-alpine
            file: ./docker/alpine.Dockerfile
            target: linkding
            suffix: -alpine
            cache_ref: ghcr.io/zhijunio/linkding:buildcache-alpine
          - name: latest-plus
            file: ./docker/default.Dockerfile
            target: linkding-plus
            suffix: -plus
            cache_ref: ghcr.io/zhijunio/linkding:buildcache
          - name: latest-plus-alpine
            file: ./docker/alpine.Dockerfile
            target: linkding-plus
            suffix: -plus-alpine
            cache_ref: ghcr.io/zhijunio/linkding:buildcache-alpine
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          tags: |
            zhijunio/linkding:${{ matrix.name }}
            zhijunio/linkding:${{ needs.prepare.outputs.version }}${{ matrix.suffix }}
            ghcr.io/zhijunio/linkding:${{ matrix.name }}
            ghcr.io/zhijunio/linkding:${{ needs.prepare.outputs.version }}${{ matrix.suffix }}
          target: ${{ matrix.target }}
          push: true
          cache-from: type=registry,ref=${{ matrix.cache_ref }}
          cache-to: type=registry,ref=${{ matrix.cache_ref }},mode=max
