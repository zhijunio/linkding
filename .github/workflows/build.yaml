name: build

on: workflow_dispatch

env:
  DOCKER_BUILDKIT: 1
  BUILDKIT_PROGRESS: plain

jobs:
  build:
    runs-on: ubuntu-24.04-8-cores
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: latest
            file: ./docker/default.Dockerfile
            target: linkding
            platforms: linux/amd64,linux/arm64
            version_suffix: ""
            cache_id: debian
          - name: latest-alpine
            file: ./docker/alpine.Dockerfile
            target: linkding
            platforms: linux/amd64,linux/arm64
            version_suffix: -alpine
            cache_id: alpine
          - name: latest-plus
            file: ./docker/default.Dockerfile
            target: linkding-plus
            platforms: linux/amd64,linux/arm64
            version_suffix: -plus
            cache_id: debian
          - name: latest-plus-alpine
            file: ./docker/alpine.Dockerfile
            target: linkding-plus
            platforms: linux/amd64,linux/arm64
            version_suffix: -plus-alpine
            cache_id: alpine
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            npm-

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: /home/runner/.cache/uv
          key: uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-

      - name: Get version
        id: get_version
        run: echo "version=$(cat version.txt)" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          buildkitd-config-inline: |
            [worker.oci]
              max-parallelism = 8

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          platforms: ${{ matrix.platforms }}
          tags: |
            zhijunio/linkding:${{ matrix.name }}
            zhijunio/linkding:${{ steps.get_version.outputs.version }}${{ matrix.version_suffix }}
            ghcr.io/zhijunio/linkding:${{ matrix.name }}
            ghcr.io/zhijunio/linkding:${{ steps.get_version.outputs.version }}${{ matrix.version_suffix }}
          target: ${{ matrix.target }}
          push: true
          provenance: false
          # Use both GHA cache (fast) and registry cache (persistent)
          cache-from: |
            type=gha,scope=${{ matrix.cache_id }}
            type=registry,ref=ghcr.io/zhijunio/linkding:buildcache-${{ matrix.cache_id }}
          cache-to: |
            type=gha,scope=${{ matrix.cache_id }},mode=max
            type=registry,ref=ghcr.io/zhijunio/linkding:buildcache-${{ matrix.cache_id }},mode=max
