{% load shared i18n %}
{% htmlmin %}
<div class="bulk-edit-bar">
  <label class="form-checkbox bulk-edit-checkbox all">
    <input type="checkbox">
    <i class="form-icon"></i>
  </label>
  <select name="bulk_action" class="form-select select-sm">
    {% if not 'bulk_archive' in bookmark_list.bulk_edit_disabled_actions %}
      <option value="bulk_archive">{% trans "Archive" %}</option>
    {% endif %}
    {% if not 'bulk_unarchive' in bookmark_list.bulk_edit_disabled_actions %}
      <option value="bulk_unarchive">{% trans "Unarchive" %}</option>
    {% endif %}
    <option value="bulk_delete">{% trans "Delete" %}</option>
    <option value="bulk_tag">{% trans "Add tags" %}</option>
    <option value="bulk_untag">{% trans "Remove tags" %}</option>
    <option value="bulk_read">{% trans "Mark as read" %}</option>
    <option value="bulk_unread">{% trans "Mark as unread" %}</option>
    {% if request.user_profile.enable_sharing %}
      <option value="bulk_share">{% trans "Share" %}</option>
      <option value="bulk_unshare">{% trans "Unshare" %}</option>
    {% endif %}
    <option value="bulk_refresh">{% trans "Refresh from website" %}</option>
    {% if bookmark_list.snapshot_feature_enabled %}<option value="bulk_snapshot">{% trans "Create HTML snapshot" %}</option>{% endif %}
  </select>
  <ld-tag-autocomplete input-name="bulk_tag_string"
                       input-placeholder="{% trans 'Tag names...' %}"
                       variant="small">
  </ld-tag-autocomplete>
  <button data-confirm
          type="submit"
          name="bulk_execute"
          class="btn btn-link btn-sm">
    <span>{% trans "Execute" %}</span>
  </button>
  <button type="submit"
          name="bulk_copy_markdown"
          value="1"
          class="btn btn-link btn-sm">
    <span>{% trans "Copy as Markdown" %}</span>
  </button>
  <label class="form-checkbox select-across d-none">
    <input type="checkbox" name="bulk_select_across">
    <i class="form-icon"></i>
    {% trans "All" %} <span class="total">{{ bookmark_list.bookmarks_total }}</span> {% blocktrans count counter=bookmark_list.bookmarks_total %}bookmark{% plural %}bookmarks{% endblocktrans %}
  </label>
</div>
{% endhtmlmin %}
