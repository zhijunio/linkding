{% load i18n %}
<turbo-frame id="api-modal">
<form method="post"
      action="{% url 'linkding:settings.integrations.create_api_token' %}"
      data-turbo-frame="api-section">
  {% csrf_token %}
  <ld-modal class="modal active"
            data-close-url="{% url 'linkding:settings.integrations' %}"
            data-turbo-frame="api-modal">
    <div class="modal-overlay" data-close-modal></div>
    <div class="modal-container" role="dialog" aria-modal="true">
      {% include 'shared/modal_header.html' with title=_("Create API Token") %}
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label" for="token-name">{% trans "Token name" %}</label>
          <input type="text"
                 class="form-input"
                 id="token-name"
                 name="name"
                 placeholder="{% trans 'e.g., Browser Extension, Mobile App' %}"
                 value="{% trans 'API Token' %}"
                 maxlength="128">
          <p class="form-input-hint">{% trans "A descriptive name to identify the purpose of the token" %}</p>
        </div>
      </div>
      <div class="modal-footer modal-footer-stacked">
        <button type="submit" class="btn btn-primary btn-wide">{% trans "Create Token" %}</button>
        <button type="button" class="btn btn-wide" data-close-modal>{% trans "Cancel" %}</button>
      </div>
    </div>
  </ld-modal>
</form>
</turbo-frame>
